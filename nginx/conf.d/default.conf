# ==========================================================
# CONFIGURATION NGINX PRODUCTION
# ==========================================================

# 1. PROTECTION CONTRE LES ATTAQUES (Rate Limiting)
# On crée une zone en mémoire de 10Mo (api_limit) qui suit l'adresse IP ($binary_remote_addr).
# 'rate=10r/s' : On autorise 10 requêtes par seconde par utilisateur max.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# 2. DÉFINITION DES SERVICES (Upstreams)
# On pointe vers les noms des services définis dans ton docker-compose.yml
upstream api {
    server api:3000;
}

upstream frontend {
    server frontend:80;
}

# ----------------------------------------------------------
# BLOC HTTP (Port 80)
# Sert au challenge SSL et à la redirection
# ----------------------------------------------------------
server {
    listen 80;
    server_name _; # Répond à n'importe quel nom de domaine dirigé ici

    # SÉCURITÉ : Cache la version de Nginx (ex: nginx/1.25.1) dans les erreurs/headers
    server_tokens off;

    # CHALLENGE CERTBOT : Indispensable pour prouver à Let's Encrypt que tu possèdes le domaine
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # REDIRECTION HTTPS : À décommenter une fois que tu as tes certificats
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # CONFIG TEMPORAIRE (En attendant le HTTPS)
    # ----------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay; # Applique le frein de sécurité

        proxy_pass http://api/; # Transmet la requête au backend
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr; # Donne la vraie IP du client au backend
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

